  <rect width="64" height="64" rx="14" fill="#1B3A6B"/>
  <!-- Circular arc (the C shape from the logo) -->
  <circle cx="28" cy="32" r="18" fill="none" stroke="#50BB9B" stroke-width="5" stroke-dasharray="90 25" stroke-linecap="round" transform="rotate(-45 28 32)"/>
  <!-- Lightning bolt (centered in the circle) -->
  <path d="M30 16 L22 33 L28 33 L26 48 L36 30 L30 30 Z" fill="#FFFFFF"/>
  <!-- Vertical bars (the I from the logo mark) -->
  <rect x="48" y="20" width="4" height="24" rx="2" fill="#50BB9B"/>
  <rect x="55" y="24" width="3" height="16" rx="1.5" fill="#50BB9B" opacity="0.7"/>
</svg>
